neoForm {
    additionalCompileDependencies = [
        'com.google.code.findbugs:jsr305:3.0.2',
        'org.jetbrains:annotations:26.0.2-1'
    ]

    preProcessJar {
        classpath = ['net.neoforged.installertools:installertools:4.0.16:fatjar']
        args = ['--task', 'PROCESS_MINECRAFT_JAR', '--input', '{inputServerJar}', '--output', '{output}', '--no-mod-manifest']
    }
    
    useServer = true
}